<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピクタイピング</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Hiragino Sans', sans-serif; background: #64C5F7; margin: 0; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* ホーム画面 */
        #home-screen { display: flex; flex-direction: column; align-items: center; text-align: center; }
        h1 { font-size: 60px; margin-bottom: 50px; text-shadow: 2px 4px 0 rgba(0,0,0,0.2); }
        .match-btn { background: white; color: #64C5F7; border: none; padding: 20px 60px; font-size: 30px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 0 #4da6d4; }
        .match-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #4da6d4; }

        /* ゲーム画面 */
        #game-screen { display: none; width: 100%; max-width: 450px; height: 100vh; background: #64C5F7; position: relative; }
        #word-card { width: 80%; background: white; color: #333; margin: 50px auto; padding: 30px; border-radius: 20px; text-align: center; font-size: 40px; font-weight: bold; }
        #bomb { position: absolute; bottom: 20%; font-size: 60px; transition: 0.3s; }
        #input-field { position: fixed; bottom: 0; width: 100%; height: 60px; font-size: 24px; text-align: center; }
    </style>
</head>
<body>

<div id="home-screen">
    <h1>ピクタイピング</h1>
    <button class="match-btn" onclick="startMatchmaking()">マッチング開始</button>
</div>

<div id="game-screen">
    <div id="word-card">待機中...</div>
    <div id="bomb">💣</div>
    <input type="text" id="input-field" placeholder="ここに入力...">
</div>

<script>
    const firebaseConfig = { /* ここに以前のFirebase設定を入れてください */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let myRole = null;
    let currentRoom = null;

    async function startMatchmaking() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        // 1. 全ルームを取得
        const roomsSnap = await db.ref('rooms').once('value');
        let matchedRoom = null;

        // 2. 空いている部屋(プレイヤー1人)を探す
        roomsSnap.forEach(snap => {
            const roomData = snap.val();
            if (Object.keys(roomData.players || {}).length === 1) {
                matchedRoom = snap.key;
            }
        });

        // 3. 部屋があれば参加、なければ作る
        if (matchedRoom) {
            currentRoom = matchedRoom;
            myRole = 'p2';
            await db.ref(`rooms/${currentRoom}/players/p2`).set(true);
        } else {
            currentRoom = 'room_' + Date.now();
            myRole = 'p1';
            await db.ref(`rooms/${currentRoom}/players/p1`).set(true);
            await db.ref(`rooms/${currentRoom}/status`).set('waiting');
        }

        listenGame(currentRoom);
    }

    function listenGame(roomId) {
        db.ref(`rooms/${roomId}`).on('value', snap => {
            const data = snap.val();
            if (data.status === 'waiting' && Object.keys(data.players).length === 2) {
                db.ref(`rooms/${roomId}/status`).set('playing');
                db.ref(`rooms/${roomId}/word`).set('りんご');
                db.ref(`rooms/${roomId}/turn`).set('p1');
            }
            // ここに以前のゲーム進行ロジック（表示更新など）を統合
            if(data.status === 'playing') {
                document.getElementById('word-card').innerText = data.word;
                // ...（以下、爆弾の移動や入力判定など）
            }
        });
    }
</script>
</body>
</html>
