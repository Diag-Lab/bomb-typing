<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOMB TYPING BATTLE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --p1-color: #8bc34a; --p2-color: #f44336; --bg-blue: #4facfe; }
        body { font-family: 'Arial Rounded MT Bold', sans-serif; background-color: #333; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-screen { position: relative; width: 100vw; height: 100vh; max-width: 450px; background: var(--bg-blue); border: 4px solid #fff; box-sizing: border-box; }

        /* ロビー */
        #lobby { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .card { background: white; color: #333; padding: 25px; border-radius: 20px; text-align: center; width: 80%; }
        #start-btn { background: #ff4b2b; color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 50px; cursor: pointer; margin-top: 15px; display: none; width: 100%; font-weight: bold; }

        /* ヘッダー UI */
        #top-bar { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 50; }
        #timer-label { color: white; font-size: 50px; font-weight: 900; text-shadow: 3px 3px 0 #000; margin-bottom: 5px; }
        #timer-wrap { width: 80%; height: 20px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; border: 3px solid white; }
        #timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff9800, #ff4b2b); transition: width 0.1s linear; }

        /* お題パネル */
        #word-area { position: absolute; top: 25%; left: 50%; transform: translateX(-50%); width: 85%; background: white; padding: 30px 10px; border-radius: 20px; text-align: center; box-shadow: 0 10px 0 rgba(0,0,0,0.2); z-index: 40; }
        #target-word { font-size: 42px; font-weight: bold; color: #333; margin: 0; }
        #input-view { font-size: 24px; color: #ff4b2b; margin-top: 10px; min-height: 1.2em; letter-spacing: 2px; }

        /* キャラクターと爆弾 */
        .player { position: absolute; bottom: 20%; width: 90px; height: 90px; transition: 0.3s; z-index: 30; }
        #p1-char { left: 30px; background: var(--p1-color); border-radius: 20px; border: 4px solid white; }
        #p2-char { right: 30px; background: var(--p2-color); border-radius: 20px; border: 4px solid white; }
        .active-turn { transform: scale(1.2); box-shadow: 0 0 20px #fff; }
        .label { position: absolute; top: -30px; width: 100%; text-align: center; color: white; font-weight: bold; }

        #bomb { position: absolute; bottom: 22%; left: 50%; transform: translateX(-50%); font-size: 60px; z-index: 45; transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: none; }
        
        #input-field { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: 1; }
    </style>
</head>
<body>

<div id="game-screen">
    <div id="lobby">
        <div class="card">
            <h2 id="room-id">ROOM: --</h2>
            <h3 id="my-role">接続中...</h3>
            <p id="status-text">読み込み中...</p>
            <button id="start-btn">バトル開始！</button>
        </div>
    </div>

    <div id="top-bar">
        <div id="timer-label">10.0</div>
        <div id="timer-wrap"><div id="timer-bar"></div></div>
    </div>

    <div id="word-area">
        <div id="target-word">READY?</div>
        <div id="input-view"></div>
    </div>

    <div id="p1-char" class="player"><div class="label">P1</div></div>
    <div id="p2-char" class="player"><div class="label">P2</div></div>

    <div id="bomb">💣</div>
    <input type="text" id="input-field" autocomplete="off" autofocus>
</div>

<script>
    // Firebase 設定
    const firebaseConfig = {
        apiKey: "AIzaSyCgQ8Pz_7PKOpD15wHegpTsHqF1SyocFl4",
        authDomain: "typing-battle-2cad7.firebaseapp.com",
        databaseURL: "https://typing-battle-2cad7-default-rtdb.firebaseio.com/",
        projectId: "typing-battle-2cad7",
        storageBucket: "typing-battle-2cad7.firebasestorage.app",
        messagingSenderId: "801345135851",
        appId: "1:801345135851:web:d43beff787727807834aae"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'default_room';
    const roomRef = db.ref('rooms/' + roomId);

    let myRole = null;
    let isPlaying = false;
    const wordList = ["りんご", "すいか", "みかん", "ばなな", "ぶどう", "いちご", "れもん"];

    // 入室処理
    roomRef.child('players').transaction(cur => {
        if (!cur) return { p1: true };
        if (!cur.p1) return { ...cur, p1: true };
        if (!cur.p2) return { ...cur, p2: true };
        return; // full
    }, (err, committed, snap) => {
        if (!committed) { alert("部屋が満員です"); return; }
        
        // 自分の役割を確定
        const players = snap.val();
        myRole = (!players.p2) ? 'p1' : 'p2';
        document.getElementById('my-role').innerText = "あなたは " + myRole.toUpperCase();
        document.getElementById('room-id').innerText = "ROOM: " + roomId;
        roomRef.child('players/' + myRole).onDisconnect().remove();
        
        startListening();
    });

    function startListening() {
        roomRef.on('value', snap => {
            const data = snap.val() || {};
            const p = data.players || {};

            // ロビー管理
            if (data.status === 'playing') {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('bomb').style.display = 'block';
                isPlaying = true;
                updateGameUI(data);
            } else {
                document.getElementById('lobby').style.display = 'flex';
                document.getElementById('bomb').style.display = 'none';
                isPlaying = false;
                document.getElementById('status-text').innerText = (p.p1 && p.p2) ? "準備完了！" : "相手を待っています...";
                if (myRole === 'p1' && p.p1 && p.p2) document.getElementById('start-btn').style.display = 'block';
            }

            if (data.status === 'gameOver') {
                alert("P" + data.winner.toUpperCase().slice(1) + " の勝利！");
                roomRef.update({ status: 'waiting' });
            }
        });
    }

    // ゲーム開始ボタン
    document.getElementById('start-btn').onclick = () => {
        roomRef.update({
            status: 'playing',
            turn: 'p1',
            word: wordList[Math.floor(Math.random() * wordList.length)],
            time: 10.0
        });
    };

    function updateGameUI(data) {
        document.getElementById('target-word').innerText = data.word;
        document.getElementById('timer-label').innerText = data.time.toFixed(1);
        document.getElementById('timer-bar').style.width = (data.time * 10) + "%";
        
        // 爆弾の位置
        const bombEl = document.getElementById('bomb');
        bombEl.style.left = (data.turn === 'p1') ? "20%" : "80%";
        
        // アクティブ表示
        document.getElementById('p1-char').classList.toggle('active-turn', data.turn === 'p1');
        document.getElementById('p2-char').classList.toggle('active-turn', data.turn === 'p2');

        if (data.turn === myRole) {
            document.getElementById('input-field').focus();
        }
    }

    // 入力処理
    const inputField = document.getElementById('input-field');
    inputField.addEventListener('input', () => {
        roomRef.get().then(snap => {
            const data = snap.val();
            if (data.turn !== myRole || !isPlaying) return;

            const typed = inputField.value;
            document.getElementById('input-view').innerText = typed;

            if (typed === data.word) {
                roomRef.update({
                    turn: (myRole === 'p1' ? 'p2' : 'p1'),
                    word: wordList[Math.floor(Math.random() * wordList.length)],
                    time: Math.min(data.time + 1.5, 10.0) // 正解で少し回復
                });
                inputField.value = "";
                document.getElementById('input-view').innerText = "";
            }
        });
    });

    // P1が時間を管理する
    setInterval(() => {
        if (myRole === 'p1' && isPlaying) {
            roomRef.child('time').transaction(t => {
                const nt = (t || 10) - 0.1;
                if (nt <= 0) {
                    roomRef.get().then(s => {
                        const d = s.val();
                        roomRef.update({ status: 'gameOver', winner: d.turn === 'p1' ? 'p2' : 'p1' });
                    });
                    return 0;
                }
                return nt;
            });
        }
    }, 100);

    // 画面タップでキーボード強制起動（スマホ対策）
    document.addEventListener('touchstart', () => {
        if (isPlaying) inputField.focus();
    });
</script>

</body>
</html>
