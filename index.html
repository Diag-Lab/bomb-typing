<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flick Bomb Battle Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --blue-bg: #4facfe;
            --accent-orange: #ff9800;
        }
        body { font-family: sans-serif; background-color: #222; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #game-screen { position: relative; width: 100vw; height: 100vh; max-width: 500px; background: var(--blue-bg); overflow: hidden; border: 6px solid #fff; box-sizing: border-box; }

        /* ロビー画面 */
        #lobby-screen { 
            position: absolute; inset: 0; 
            background: var(--blue-bg); 
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .lobby-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px; border-radius: 20px; text-align: center; width: 80%;
        }
        #start-btn { 
            background: #ff4b2b; color: white; border: none; padding: 15px 30px; 
            font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; 
            margin-top: 20px; display: none; width: 100%;
        }

        /* ゲーム中 UI */
        #timer-container { position: absolute; top: 0; left: 0; width: 100%; height: 14px; background: rgba(0,0,0,0.2); }
        #timer-bar { width: 100%; height: 100%; background: #ff4b2b; transition: width 0.1s linear; }
        #word-panel { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); background: white; width: 80%; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 8px 0 var(--accent-orange); }
        #target-word { font-size: 36px; font-weight: bold; margin: 0; color: #333; }
        .character { position: absolute; bottom: 30%; width: 70px; filter: grayscale(100%); opacity: 0.5; }
        #player-left { left: 40px; }
        #player-right { right: 40px; }
        .connected { filter: grayscale(0%); opacity: 1; }
        #bomb { position: absolute; bottom: 33%; left: 50%; width: 70px; transform: translateX(-50%); display: none; font-size: 50px; }
        #input-field { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; }
    </style>
</head>
<body>

<div id="game-screen">
    <div id="lobby-screen">
        <div class="lobby-card">
            <h2 style="margin:0">LOBBY</h2>
            <p id="room-display" style="font-size:12px; color:#888;">Room: --</p>
            <p id="role-display" style="font-weight:bold; font-size:18px; color:#333;">接続中...</p>
            <p id="wait-msg" style="color:#ff4b2b;">お待ちください...</p>
            <button id="start-btn">ゲーム開始！</button>
        </div>
    </div>

    <div id="timer-container"><div id="timer-bar"></div></div>
    <div id="word-panel"><p id="target-word">READY?</p></div>

    <div id="player-left" class="character"><img src="https://api.iconify.design/mdi:account.svg?color=%238bc34a" width="70"></div>
    <div id="player-right" class="character"><img src="https://api.iconify.design/mdi:account.svg?color=%23f44336" width="70"></div>

    <div id="bomb">💣</div>
    <input type="text" id="input-field" autocomplete="off">
</div>

<script>
    // Firebase 設定
    const firebaseConfig = {
        apiKey: "AIzaSyCgQ8Pz_7PKOpD15wHegpTsHqF1SyocFl4",
        authDomain: "typing-battle-2cad7.firebaseapp.com",
        databaseURL: "https://typing-battle-2cad7-default-rtdb.firebaseio.com/",
        projectId: "typing-battle-2cad7",
        storageBucket: "typing-battle-2cad7.firebasestorage.app",
        messagingSenderId: "801345135851",
        appId: "1:801345135851:web:d43beff787727807834aae"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'default_room';
    const roomRef = database.ref('rooms/' + roomId);

    let myRole = null;
    let gameActive = false;
    const wordList = ["りんご", "すいか", "みかん", "ばなな", "ふんどし"];

    const input = document.getElementById('input-field');
    const targetH = document.getElementById('target-word');
    const bomb = document.getElementById('bomb');
    const timerBar = document.getElementById('timer-bar');
    const lobby = document.getElementById('lobby-screen');
    const startBtn = document.getElementById('start-btn');
    const waitMsg = document.getElementById('wait-msg');

    document.getElementById('room-display').innerText = `Room: ${roomId}`;

    // 入室処理：空いている場所を探して入る
    async function joinRoom() {
        const snapshot = await roomRef.child('players').get();
        const players = snapshot.val() || {};

        // もし誰もいなければ一度部屋をリセット（満員バグ防止）
        if (Object.keys(players).length === 0) {
            await roomRef.remove();
        }

        // 空き枠に自分を入れる
        roomRef.child('players').transaction((currentPlayers) => {
            if (currentPlayers === null) return { p1: true };
            if (!currentPlayers.p1) return { ...currentPlayers, p1: true };
            if (!currentPlayers.p2) return { ...currentPlayers, p2: true };
            return; // 満員
        }, (error, committed, snapshot) => {
            if (committed) {
                const data = snapshot.val();
                // 自分がどちらのキーを持っているか判定
                // 簡易的に、最後に増えたのが自分
                myRole = (!players.p1) ? 'p1' : 'p2';
                document.getElementById('role-display').innerText = `あなたは ${myRole.toUpperCase()} です`;
                roomRef.child('players/' + myRole).onDisconnect().remove();
                listenRoom();
            } else {
                alert("満員です。URLの最後に ?room=2 を追加して別室へ。");
            }
        });
    }

    function listenRoom() {
        roomRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const players = data.players || {};

            // 接続表示
            document.getElementById('player-left').classList.toggle('connected', !!players.p1);
            document.getElementById('player-right').classList.toggle('connected', !!players.p2);

            // スタートボタン表示（P1のみ）
            if (myRole === 'p1' && players.p1 && players.p2 && data.status !== 'playing') {
                startBtn.style.display = 'block';
                waitMsg.innerText = "準備完了！";
            } else {
                startBtn.style.display = 'none';
                if (data.status !== 'playing') waitMsg.innerText = "相手の参加を待っています...";
            }

            // ゲーム状態の同期
            if (data.status === 'playing') {
                if (!gameActive) {
                    gameActive = true;
                    lobby.style.display = 'none';
                    bomb.style.display = 'block';
                }
                updateUI(data);
            } else if (data.status === 'gameOver' && gameActive) {
                gameActive = false;
                alert((data.winner === myRole ? "勝ちました！" : "負けました...") + " (P" + data.winner.slice(1) + "の勝利)");
                location.reload(); // リセットしてロビーへ
            }
        });
    }

    startBtn.onclick = () => {
        roomRef.update({
            status: 'playing',
            currentTurn: 'p1',
            timeLeft: 100,
            currentWord: wordList[Math.floor(Math.random() * wordList.length)]
        });
    };

    function updateUI(data) {
        targetH.innerText = data.currentWord;
        bomb.style.left = (data.currentTurn === 'p1' ? "25%" : "75%");
        timerBar.style.width = data.timeLeft + "%";
        if (data.currentTurn === myRole) input.focus(); else input.blur();
    }

    // 入力判定
    input.addEventListener('input', () => {
        roomRef.get().then(s => {
            const data = s.val();
            if (data.currentTurn !== myRole || !gameActive) return;
            if (input.value === data.currentWord) {
                roomRef.update({
                    currentTurn: (myRole === 'p1' ? 'p2' : 'p1'),
                    currentWord: wordList[Math.floor(Math.random() * wordList.length)],
                    timeLeft: Math.min(data.timeLeft + 15, 100)
                });
                input.value = "";
            }
        });
    });

    // P1がタイマーを動かす
    setInterval(() => {
        if (myRole === 'p1' && gameActive) {
            roomRef.child('timeLeft').transaction(t => {
                const newT = (t || 100) - 1.5;
                if (newT <= 0) {
                    roomRef.update({ status: 'gameOver', winner: 'p2' }); // P1のタイムアウトはP2勝利
                    return 0;
                }
                return newT;
            });
        }
    }, 200);

    joinRoom();
</script>
</body>
</html>
