<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>スマホ対応！BOMB TYPING | オンライン対戦爆弾タイピング</title>
    <meta name="description" content="ブラウザで遊べるスマホ対応の無料タイピング練習ゲーム。オンラインでマッチングした相手と爆弾を押し付け合う白熱のタイピングバトル！">
    
    <link rel="icon" href="1777848170990.png" type="image/png">
    <link rel="apple-touch-icon" href="1777848170990.png">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --p1: #10b981; 
            --p2: #ef4444; 
            --bg: #0f172a; 
        }

        body {
            font-family: 'Inter', 'Hiragino Sans', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            margin: 0;
            color: white;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 20px;
            border-radius: 32px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 28px; margin-bottom: 10px; letter-spacing: 2px; }

        .btn {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.4);
            transition: all 0.2s;
            margin-top: 15px;
        }

        .btn:active { transform: scale(0.98); opacity: 0.9; }

        #ready-go { font-size: 70px; font-weight: 900; color: #fbbf24; display: none; text-shadow: 0 0 20px rgba(251,191,36,0.5); }

        #game-area { width: 100%; max-width: 450px; height: 60%; position: relative; display: none; padding-top: 30px; }
        
        #timer-num { font-size: 55px; font-weight: 900; color: #fbbf24; text-align: center; margin-bottom: 5px; }
        
        #bar-bg { width: 90%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 20px; margin: 5px auto; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        #bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ef4444, #fbbf24); transition: width 0.1s linear; }

        #word-box {
            width: 88%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            margin: 30px auto;
            padding: 35px 10px;
            border-radius: 28px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        #target { font-size: 46px; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        #echo { color: #ec4899; font-size: 26px; font-weight: bold; min-height: 32px; margin-top: 15px; }

        .player { 
            position: absolute; bottom: 30px; width: 75px; height: 75px; 
            border-radius: 22px; border: 2px solid rgba(255,255,255,0.2); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        #p1-ui { left: 25px; background: var(--p1); }
        #p2-ui { right: 25px; background: var(--p2); }
        
        .active { transform: scale(1.15); border-color: #fff; box-shadow: 0 0 30px currentColor; z-index: 10; }

        #bomb-ui { 
            position: absolute; bottom: 40px; font-size: 60px; 
            transition: left 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); 
            transform: translateX(-50%);
            filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.5));
            animation: bounce 0.6s infinite alternate ease-in-out;
        }

        @keyframes bounce {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(-15px); }
        }

        #hidden-input { position: fixed; top: -100px; opacity: 0; }
        .stats-text { font-size: 15px; opacity: 0.8; margin: 12px 0; }
    </style>
</head>
<body>

<div id="overlay">
    <div id="lobby-ui" class="card">
        <h1>BOMB TYPING</h1>
        <p class="stats-text">通算勝利数: <span id="win-count" style="color: #fbbf24; font-weight: 900;">0</span>勝</p>
        <button id="start-btn" class="btn" onclick="searchMatch()">マッチング開始</button>
        <p id="status-msg" style="margin-top:15px; font-size: 14px; opacity: 0.6;">オンライン対戦 / ボット戦</p>
    </div>
    <div id="ready-go">READY</div>
</div>

<div id="game-area">
    <div id="timer-num">10.0</div>
    <div id="bar-bg"><div id="bar-fill"></div></div>
    <div id="word-box"><div id="target">---</div><div id="echo"></div></div>
    <div id="p1-ui" class="player">P1</div>
    <div id="p2-ui" class="player">P2</div>
    <div id="bomb-ui">💣</div>
</div>

<input type="text" id="hidden-input" autocomplete="off" spellcheck="false">

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgQ8Pz_7PKOpD15wHegpTsHqF1SyocFl4",
        authDomain: "typing-battle-2cad7.firebaseapp.com",
        databaseURL: "https://typing-battle-2cad7-default-rtdb.firebaseio.com/",
        projectId: "typing-battle-2cad7",
        storageBucket: "typing-battle-2cad7.firebasestorage.app",
        messagingSenderId: "801345135851",
        appId: "1:801345135851:web:d43beff787727807834aae"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let myRole = null, currentRoom = null, isPlaying = false, isBotMatch = false, gameEnded = false;
    let winCount = parseInt(localStorage.getItem('bomb_typing_wins')) || 0;
    
    const words = ["りんご", "みかん", "すいか", "めろん", "いちご", "ぶどう", "れもん", "とまと", "なすび", "きゅうり", "にんじん", "たまねぎ", "れんこん", "かぼちゃ", "しいたけ", "えのき", "さんま", "まぐろ", "あじ", "えび", "かに", "いか", "たこ", "くらげ", "いるか", "くじら", "ぺんぎん", "らっこ", "あざらし", "いぬ", "ねこ", "うさぎ", "ぱんだ", "きりん", "らいおん", "とら", "くま", "りす", "きつね", "たぬき", "ひつじ", "やぎ", "うま", "しか", "わに", "かめ", "かえる", "すずめ", "つばめ", "つくえ", "いす", "えんぴつ", "のーと", "かばん", "めがね", "とけい", "てれび", "すまほ", "くるま"];

    document.getElementById('win-count').innerText = winCount;

    async function searchMatch() {
        document.getElementById('start-btn').innerText = "対戦相手を探しています...";
        const snap = await db.ref('rooms').once('value');
        let foundId = null;
        snap.forEach(s => { if (s.val().status === 'waiting') foundId = s.key; });

        if (foundId) {
            currentRoom = foundId; myRole = 'p2';
            await db.ref(`rooms/${currentRoom}`).update({ status: 'starting', 'players/p2': true });
        } else {
            currentRoom = 'room_' + Date.now(); myRole = 'p1';
            await db.ref(`rooms/${currentRoom}`).set({ status: 'waiting', players: { p1: true }, time: 10.0, turn: 'p1' });
            setTimeout(async () => {
                const r = await db.ref(`rooms/${currentRoom}`).get();
                if (r && r.val().status === 'waiting') { isBotMatch = true; db.ref(`rooms/${currentRoom}`).update({ status: 'starting', 'players/bot': true }); }
            }, 4000);
        }
        listen();
    }

    function listen() {
        db.ref(`rooms/${currentRoom}`).on('value', snap => {
            const d = snap.val(); 
            if (!d || gameEnded) return;

            if (d.status === 'starting') runReadyGo();
            
            if (d.status === 'playing') {
                if (!isPlaying) {
                    isPlaying = true;
                    document.getElementById('overlay').style.display = 'none';
                    document.getElementById('game-area').style.display = 'block';
                }
                UpdateUI(d);
                if (isBotMatch && d.turn === 'bot') runBot(d.word);
            }

            if (d.status === 'gameOver') {
                gameEnded = true; isPlaying = false;
                const isWin = (d.winner === myRole);
                if (isWin) {
                    winCount++;
                    localStorage.setItem('bomb_typing_wins', winCount);
                }
                alert(isWin ? `あなたの勝ち！\n通算勝利数: ${winCount}勝` : "あなたの負け...");
                location.reload();
            }
        });
    }

    function runReadyGo() {
        document.getElementById('lobby-ui').style.display = 'none';
        const rg = document.getElementById('ready-go');
        rg.style.display = 'block';
        if (myRole === 'p1' && !isPlaying) {
            setTimeout(() => {
                db.ref(`rooms/${currentRoom}`).update({ status: 'playing', word: words[Math.floor(Math.random() * words.length)], time: 10.0 });
            }, 2000);
        }
    }

    function UpdateUI(d) {
        document.getElementById('target').innerText = d.word;
        document.getElementById('timer-num').innerText = d.time.toFixed(1);
        document.getElementById('bar-fill').style.width = (d.time * 10) + "%";
        document.getElementById('bomb-ui').style.left = (d.turn === 'p1') ? "20%" : "80%";
        document.getElementById('p1-ui').classList.toggle('active', d.turn === 'p1');
        document.getElementById('p2-ui').classList.toggle('active', d.turn !== 'p1');
        document.getElementById('p2-ui').innerText = isBotMatch ? "BOT" : "P2";
        if (d.turn === myRole) { input.focus(); } else { if (input.value !== "") clearInput(); }
    }

    const input = document.getElementById('hidden-input');
    input.addEventListener('input', async () => {
        const val = input.value;
        document.getElementById('echo').innerText = val;
        const snap = await db.ref(`rooms/${currentRoom}`).get();
        const d = snap.val();
        if (isPlaying && d.turn === myRole && val === d.word) {
            clearInput();
            await db.ref(`rooms/${currentRoom}`).update({
                turn: isBotMatch ? 'bot' : (myRole === 'p1' ? 'p2' : 'p1'),
                word: words[Math.floor(Math.random() * words.length)],
                time: Math.min(d.time + 1.5, 10.0)
            });
        }
    });

    function clearInput() { input.value = ""; document.getElementById('echo').innerText = ""; }

    let isBotRunning = false;
    function runBot(targetWord) {
        if (!isPlaying || gameEnded || isBotRunning) return;
        isBotRunning = true;
        const speedPerChar = Math.random() * 0.3 + 0.45; 
        const totalWaitTime = (targetWord.length * speedPerChar * 1000) + 800;
        setTimeout(async () => {
            isBotRunning = false;
            const snap = await db.ref(`rooms/${currentRoom}`).get();
            const d = snap.val();
            if (d && d.turn === 'bot') {
                db.ref(`rooms/${currentRoom}`).update({ turn: 'p1', word: words[Math.floor(Math.random() * words.length)], time: Math.min(d.time + 0.8, 10.0) });
            }
        }, totalWaitTime);
    }

    setInterval(async () => {
        if (myRole === 'p1' && isPlaying && !gameEnded) {
            const snap = await db.ref(`rooms/${currentRoom}`).get();
            const d = snap.val();
            if (!d || d.status !== 'playing') return;
            const nt = Math.max(0, d.time - 0.1);
            if (nt <= 0) {
                let winner = isBotMatch ? (d.turn === 'bot' ? 'p1' : 'bot') : (d.turn === 'p1' ? 'p2' : 'p1');
                db.ref(`rooms/${currentRoom}`).update({ status: 'gameOver', winner: winner });
            } else {
                db.ref(`rooms/${currentRoom}/time`).set(nt);
            }
        }
    }, 100);

    document.addEventListener('click', () => input.focus());
</script>
</body>
</html>
