<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>スマホ対応！BOMB TYPING | オンライン対戦爆弾タイピング</title>
    <meta name="description" content="ブラウザで遊べるスマホ対応の無料タイピング練習ゲーム。オンラインでマッチングした相手と爆弾を押し付け合う白熱のタイピングバトル！">
    
    <link rel="icon" href="1777848170990.png" type="image/png">
    <link rel="apple-touch-icon" href="1777848170990.png">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --p1: #10b981; 
            --p2: #ef4444; 
            --bg: #0f172a; 
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', 'Hiragino Sans', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            margin: 0;
            color: white;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.8);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 20px;
            border-radius: 32px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 6px -1px rgba(244, 63, 94, 0.4);
        }

        #ready-go { font-size: 60px; font-weight: 900; color: #fbbf24; display: none; }

        #game-area { width: 100%; max-width: 450px; height: 55%; position: relative; display: none; padding-top: 20px; }
        
        #timer-num { font-size: 50px; font-weight: 900; color: #fbbf24; text-align: center; }
        
        #bar-bg { width: 90%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 5px auto; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        #bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ef4444, #fbbf24); transition: width 0.1s linear; }

        #word-box {
            width: 85%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            color: white;
            margin: 20px auto;
            padding: 30px 10px;
            border-radius: 24px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        #target { font-size: 42px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        #echo { color: #ec4899; font-size: 24px; font-weight: bold; min-height: 30px; margin-top: 10px; opacity: 0.8; }

        /* プレイヤーアイコンのデザイン復活 */
        .player { 
            position: absolute; bottom: 20px; width: 70px; height: 70px; 
            border-radius: 20px; border: 2px solid rgba(255,255,255,0.3); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; transition: all 0.3s ease; 
        }
        #p1-ui { left: 20px; background: var(--p1); }
        #p2-ui { right: 20px; background: var(--p2); }
        .active { transform: scale(1.1); box-shadow: 0 0 25px var(--p1); border-color: #fff; }
        #p2-ui.active { box-shadow: 0 0 25px var(--p2); }

        /* 爆弾のアニメーション */
        #bomb-ui { 
            position: absolute; bottom: 30px; font-size: 55px; 
            transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform: translateX(-50%);
            filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.6));
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(-10px); }
        }

        #hidden-input { position: fixed; top: -100px; opacity: 0; }
        .stats-text { font-size: 14px; opacity: 0.7; margin-top: 10px; }
    </style>
</head>
<body>
