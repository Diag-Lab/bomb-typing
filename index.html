<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flick Bomb Battle Online</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --blue-bg: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            --accent-orange: #ff9800;
        }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #222; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #game-screen { position: relative; width: 100vw; height: 100vh; max-width: 500px; background: var(--blue-bg); overflow: hidden; border: 6px solid #fff; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* ロビー画面 */
        #lobby-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
        #start-btn { background: var(--accent-orange); color: white; border: none; padding: 15px 40px; font-size: 24px; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #e68a00; display: none; }
        #start-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #e68a00; }
        .room-info { font-size: 18px; margin-bottom: 10px; }

        /* タイマー */
        #timer-container { position: absolute; top: 0; left: 0; width: 100%; height: 14px; background: rgba(0,0,0,0.3); z-index: 20; }
        #timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff416c, #ff4b2b); transition: width 0.1s linear; }
        #timer-text { position: absolute; top: 25px; right: 20px; font-size: 32px; color: white; font-weight: 900; text-shadow: 3px 3px 0 #000; z-index: 20; }

        /* お題パネル */
        #word-panel { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); background: white; width: 85%; padding: 20px; border-radius: 20px; border-bottom: 10px solid var(--accent-orange); text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 10; }
        #target-word { font-size: 40px; font-weight: 900; margin: 0; color: #333; letter-spacing: 2px; }
        #input-guide-container { margin-top: 10px; font-size: 24px; font-weight: bold; letter-spacing: 2px; height: 30px;}
        #input-guide-container span { color: #ccc; }
        #input-guide-container .typed { color: #333; }

        /* キャラクター */
        .character { position: absolute; bottom: 35%; width: 80px; height: 130px; transition: all 0.3s; text-align: center; filter: grayscale(100%); opacity: 0.4; }
        .character img { width: 100%; }
        .player-label { background: #333; color: white; border-radius: 20px; padding: 4px 10px; font-size: 12px; margin-top: 10px; }
        #player-left { left: 30px; }
        #player-right { right: 30px; }
        .connected { filter: grayscale(0%); opacity: 1; }
        .active-turn { transform: scale(1.3); }

        /* 爆弾 */
        #bomb { position: absolute; bottom: 38%; left: 50%; width: 80px; height: 80px; transform: translateX(-50%); transition: all 0.5s; font-size: 60px; display: none; justify-content: center; align-items: center; z-index: 5; }
        .bomb-ignite { animation: shake 0.15s infinite; }

        #input-field { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; }
        #credit { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,0.6); }

        @keyframes shake { 0% { transform: translateX(-50%) rotate(0deg); } 25% { transform: translateX(-54%) rotate(5deg); } 75% { transform: translateX(-46%) rotate(-5deg); } 100% { transform: translateX(-50%) rotate(0deg); } }
    </style>
</head>
<body>

<div id="game-screen">
    <!-- ロビー画面 -->
    <div id="lobby-screen">
        <h2>LOBBY</h2>
        <p class="room-info" id="room-display">Room: --</p>
        <p class="room-info" id="role-display">接続中...</p>
        <p id="wait-msg">相手が参加するのを待っています...</p>
        <button id="start-btn">ゲーム開始！</button>
    </div>

    <div id="timer-container"><div id="timer-bar"></div></div>
    <div id="timer-text">10.0</div>
    
    <div id="word-panel">
        <p id="target-word">READY?</p>
        <div id="input-guide-container"></div>
    </div>

    <div id="player-left" class="character"><img src="https://api.iconify.design/mdi:account-tie.svg?color=%238bc34a"><div class="player-label">P1</div></div>
    <div id="player-right" class="character"><img src="https://api.iconify.design/mdi:account-tie.svg?color=%23f44336"><div class="player-label">P2</div></div>

    <div id="bomb" class="bomb-ignite">💣</div>
    <div id="credit">Reference: Pict-Typing</div>

    <input type="text" id="input-field" autocomplete="off">
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgQ8Pz_7PKOpD15wHegpTsHqF1SyocFl4",
        authDomain: "typing-battle-2cad7.firebaseapp.com",
        databaseURL: "https://typing-battle-2cad7-default-rtdb.firebaseio.com/",
        projectId: "typing-battle-2cad7",
        storageBucket: "typing-battle-2cad7.firebasestorage.app",
        messagingSenderId: "801345135851",
        appId: "1:801345135851:web:d43beff787727807834aae"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'default_room';
    const roomRef = database.ref('rooms/' + roomId);

    let myRole = null; 
    let gameActive = false;
    let timerInterval;
    const wordList = [{h: "りんご"}, {h: "すいか"}, {h: "みかん"}, {h: "ばなな"}, {h: "ふんどし"}];

    const input = document.getElementById('input-field');
    const targetH = document.getElementById('target-word');
    const inputGuide = document.getElementById('input-guide-container');
    const bomb = document.getElementById('bomb');
    const timerBar = document.getElementById('timer-bar');
    const timerText = document.getElementById('timer-text');
    const pLeft = document.getElementById('player-left');
    const pRight = document.getElementById('player-right');
    const lobby = document.getElementById('lobby-screen');
    const startBtn = document.getElementById('start-btn');
    const waitMsg = document.getElementById('wait-msg');

    document.getElementById('room-display').innerText = `Room: ${roomId}`;

    // 入室・ロール割り当て
    roomRef.child('players').transaction((players) => {
        if (!players) players = {};
        if (!players.left) { myRole = 'left'; players.left = true; }
        else if (!players.right) { myRole = 'right'; players.right = true; }
        return players;
    }, (err, committed) => {
        if (committed) {
            document.getElementById('role-display').innerText = `あなたは P${myRole === 'left' ? '1' : '2'} です`;
            initLobbySync();
        } else {
            alert("満員です");
        }
    });

    roomRef.child('players/' + myRole).onDisconnect().remove();

    function initLobbySync() {
        roomRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            // 接続状態の反映
            if(data.players?.left) pLeft.classList.add('connected'); else pLeft.classList.remove('connected');
            if(data.players?.right) pRight.classList.add('connected'); else pRight.classList.remove('connected');

            // スタートボタンの表示（P1のみ & 両者接続時）
            if (myRole === 'left' && data.players?.left && data.players?.right && data.status !== 'playing') {
                startBtn.style.display = 'block';
                waitMsg.style.display = 'none';
            } else {
                startBtn.style.display = 'none';
                waitMsg.style.display = 'block';
            }

            // ゲーム開始検知
            if (data.status === 'playing') {
                if (!gameActive) startGameLocal();
                updateGameUI(data);
            } else if (data.status === 'gameOver' && gameActive) {
                showGameOver(data.winner);
            }
        });
    }

    // スタートボタン（P1が押す）
    startBtn.onclick = () => {
        const firstWord = wordList[Math.floor(Math.random() * wordList.length)];
        roomRef.update({
            status: 'playing',
            winner: null, // 前回の勝者をリセット
            currentTurn: 'left',
            timeLeft: 10.0,
            currentWord: firstWord
        });
    };

    function startGameLocal() {
        gameActive = true;
        lobby.style.display = 'none';
        bomb.style.display = 'flex';
        input.value = "";
        
        if (myRole === 'left') {
            let lastTime = 10.0;
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                lastTime -= 0.1;
                roomRef.update({ timeLeft: Math.max(0, lastTime) });
                if (lastTime <= 0) {
                    clearInterval(timerInterval);
                    roomRef.get().then(s => {
                        const turn = s.val().currentTurn;
                        roomRef.update({ status: 'gameOver', winner: turn === 'left' ? 'right' : 'left' });
                    });
                }
            }, 100);
        }
    }

    function updateGameUI(data) {
        updateTurnUI(data.currentTurn);
        if (targetH.innerText !== data.currentWord?.h) {
            targetH.innerText = data.currentWord.h;
            createInputGuide(data.currentWord.h);
        }
        timerBar.style.width = (data.timeLeft * 10) + "%";
        timerText.innerText = Math.max(0, data.timeLeft).toFixed(1);
    }

    function createInputGuide(wordH) {
        inputGuide.innerHTML = "";
        for (let char of wordH) {
            const span = document.createElement('span');
            span.innerText = char;
            inputGuide.appendChild(span);
        }
    }

    function updateTurnUI(turn) {
        bomb.style.left = (turn === "left" ? "25%" : "75%");
        pLeft.classList.toggle('active-turn', turn === "left");
        pRight.classList.toggle('active-turn', turn === "right");
        if (turn === myRole) input.focus(); else input.blur();
    }

    input.addEventListener('input', () => {
        roomRef.get().then(s => {
            const data = s.val();
            if (data.currentTurn !== myRole || !gameActive) return;

            const targetWord = data.currentWord.h;
            const typed = input.value;

            // ガイドの色更新
            const spans = inputGuide.querySelectorAll('span');
            spans.forEach((span, i) => {
                if (i < typed.length) span.classList.add('typed');
                else span.classList.remove('typed');
            });

            if (typed === targetWord) {
                roomRef.update({
                    currentTurn: (myRole === 'left' ? 'right' : 'left'),
                    currentWord: wordList[Math.floor(Math.random() * wordList.length)],
                    timeLeft: Math.min(data.timeLeft + 2.0, 10.0)
                });
                input.value = "";
            }
        });
    });

    function showGameOver(winner) {
        gameActive = false;
        clearInterval(timerInterval);
        alert("P" + (winner === 'left' ? '1' : '2') + "の勝利！");
        // ロビーに戻す
        lobby.style.display = 'flex';
        bomb.style.display = 'none';
        if (myRole === 'left') roomRef.update({ status: 'waiting' });
    }

    // 画面タップで常にフォーカス
    document.addEventListener('touchstart', () => { if(gameActive) input.focus(); });
</script>
</body>
</html>
