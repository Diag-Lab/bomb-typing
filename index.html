<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flick Bomb Battle Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --blue-bg: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            --accent-orange: #ff9800;
        }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #222; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #game-screen { position: relative; width: 100vw; height: 100vh; max-width: 500px; background: var(--blue-bg); overflow: hidden; border: 6px solid #fff; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* タイマー */
        #timer-container { position: absolute; top: 0; left: 0; width: 100%; height: 14px; background: rgba(0,0,0,0.3); z-index: 20; }
        #timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff416c, #ff4b2b); transition: width 0.1s linear; }
        #timer-text { position: absolute; top: 25px; right: 20px; font-size: 32px; color: white; font-weight: 900; text-shadow: 3px 3px 0 #000; z-index: 20; }

        /* お題パネル */
        #word-panel { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); background: white; width: 85%; padding: 20px; border-radius: 20px; border-bottom: 10px solid var(--accent-orange); text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 10; }
        #target-word { font-size: 40px; font-weight: 900; margin: 0; color: #333; letter-spacing: 2px; }
        #target-romaji { font-size: 18px; color: #aaa; margin-top: 8px; font-family: 'Courier New', Courier, monospace; }

        /* ★★追加：入力ガイド（灰色の文字）★★ */
        #input-guide-container { margin-top: 10px; font-size: 24px; font-weight: bold; letter-spacing: 2px; height: 30px;}
        #input-guide-container span { color: #ccc; transition: color 0.1s; } /* 初期状態は灰色 */
        #input-guide-container .typed { color: #333; } /* 打った文字は黒色 */

        /* キャラクター */
        .character { position: absolute; bottom: 35%; width: 80px; height: 130px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; filter: grayscale(100%); opacity: 0.4; }
        .character img { width: 100%; filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.2)); }
        .player-label { background: #333; color: white; border-radius: 20px; padding: 4px 10px; font-size: 12px; margin-top: 10px; font-weight: bold; }
        #player-left { left: 30px; }
        #player-right { right: 30px; }
        .connected { filter: grayscale(0%); opacity: 1; }
        .active-turn { transform: scale(1.3); }

        /* 爆弾 */
        #bomb { position: absolute; bottom: 38%; left: 50%; width: 80px; height: 80px; transform: translateX(-50%); transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); font-size: 60px; display: none; justify-content: center; align-items: center; z-index: 5; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }
        .bomb-ignite { animation: shake 0.15s infinite; }

        /* 入力 & ガイド */
        #input-field { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: default; }
        #tap-guide { position: absolute; top: 60%; width: 100%; text-align: center; color: white; font-weight: 900; text-shadow: 0 4px 8px rgba(0,0,0,0.5); font-size: 24px; animation: blink 1.5s infinite; z-index: 15; }

        /* クレジット */
        #credit { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,0.6); z-index: 5; }

        @keyframes shake { 0% { transform: translateX(-50%) rotate(0deg); } 25% { transform: translateX(-54%) rotate(5deg); } 75% { transform: translateX(-46%) rotate(-5deg); } 100% { transform: translateX(-50%) rotate(0deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.95); } }
    </style>
</head>
<body>

<div id="game-screen">
    <div id="timer-container"><div id="timer-bar"></div></div>
    <div id="timer-text">10.0</div>
    
    <div id="word-panel">
        <p id="target-word">CONNECTING...</p>
        <div id="target-romaji">サーバーに接続中</div>
        <div id="input-guide-container"></div>
    </div>

    <div id="player-left" class="character"><img src="https://api.iconify.design/mdi:account-tie.svg?color=%238bc34a"><div class="player-label">P1</div></div>
    <div id="player-right" class="character"><img src="https://api.iconify.design/mdi:account-tie.svg?color=%23f44336"><div class="player-label">P2</div></div>

    <div id="bomb" class="bomb-ignite">💣</div>
    <div id="tap-guide" class="hidden">開始を待っています...</div>
    
    <div id="credit">Reference: Pict-Typing</div>

    <input type="text" id="input-field" autocomplete="off" autofocus>
</div>

<script>
    // ★★★ Firebaseの設定 ★★★
    const firebaseConfig = {
        apiKey: "AIzaSyCgQ8Pz_7PKOpD15wHegpTsHqF1SyocFl4", 
        authDomain: "typing-battle-2cad7.firebaseapp.com",
        databaseURL: "https://typing-battle-2cad7-default-rtdb.firebaseio.com/", 
        projectId: "typing-battle-2cad7", 
        storageBucket: "typing-battle-2cad7.firebasestorage.app", 
        messagingSenderId: "801345135851", 
        appId: "1:801345135851:web:d43beff787727807834aae" 
    };
    // ★★★★★★★★★★★★★★★★★

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'default_room';
    const roomRef = database.ref('rooms/' + roomId);

    let myRole = null; 
    let gameActive = false;
    let timerInterval;
    // お題リスト（ひらがなとローマ字）
    const wordList = [
        {h: "りんご", r: "ringo"},
        {h: "すいか", r: "suika"},
        {h: "みかん", r: "mikan"},
        {h: "ばなな", r: "banana"}
    ];

    const input = document.getElementById('input-field');
    const targetH = document.getElementById('target-word');
    const targetR = document.getElementById('target-romaji');
    const inputGuide = document.getElementById('input-guide-container'); // ガイドコンテナ
    const bomb = document.getElementById('bomb');
    const timerBar = document.getElementById('timer-bar');
    const timerText = document.getElementById('timer-text');
    const pLeft = document.getElementById('player-left');
    const pRight = document.getElementById('player-right');
    const guide = document.getElementById('tap-guide');

    // 入室処理
    roomRef.child('players').transaction((players) => {
        if (!players) players = {};
        if (!players.left) { myRole = 'left'; players.left = true; }
        else if (!players.right) { myRole = 'right'; players.right = true; }
        return players;
    }, (err, committed) => {
        if (committed) initGame();
        else alert("部屋が満員です");
    });

    // 切断時の処理
    roomRef.child('players/' + myRole).onDisconnect().remove();

    function initGame() {
        targetH.innerText = "READY?";
        targetR.innerText = (myRole === 'left' ? "あなたは P1 (左) です" : "あなたは P2 (右) です");
        guide.innerText = "相手の接続を待機中...";
        guide.classList.remove('hidden');
        
        roomRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if(data.players?.left) pLeft.classList.add('connected'); else pLeft.classList.remove('connected');
            if(data.players?.right) pRight.classList.add('connected'); else pRight.classList.remove('connected');

            if (data.status === 'playing') {
                if (!gameActive) startGameLocal();
                updateTurnUI(data.currentTurn);
                // お題をセットし、入力ガイドを生成
                if (targetH.innerText !== data.currentWord.h) {
                    targetH.innerText = data.currentWord.h;
                    targetR.innerText = data.currentWord.r;
                    createInputGuide(data.currentWord.h); // ガイド生成
                }
                timerBar.style.width = (data.timeLeft * 10) + "%";
                timerText.innerText = Math.max(0, data.timeLeft).toFixed(1);
            } else if (data.status === 'gameOver') {
                gameOverLocal(data.winner);
            }

            if (data.players?.left && data.players?.right && !gameActive) {
                guide.innerText = (myRole === 'left' ? "タップして開始！" : "P1の開始を待っています");
                guide.classList.remove('hidden');
            }
        });
    }

    // ★★追加：入力ガイド（spanタグ）を生成する関数★★
    function createInputGuide(wordH) {
        inputGuide.innerHTML = ""; // 一旦クリア
        for (let i = 0; i < wordH.length; i++) {
            const span = document.createElement('span');
            span.innerText = wordH[i];
            span.id = 'guide-' + i; // 各文字にIDを振る
            inputGuide.appendChild(span);
        }
    }

    document.addEventListener('click', () => {
        if (myRole === 'left' && !gameActive && pRight.classList.contains('connected')) {
            const nextWord = wordList[Math.floor(Math.random() * wordList.length)];
            roomRef.update({
                status: 'playing',
                currentTurn: 'left',
                timeLeft: 10.0,
                currentWord: nextWord
            });
        }
        input.focus();
    });

    function startGameLocal() {
        gameActive = true;
        guide.classList.add('hidden');
        bomb.style.display = 'flex';
        input.value = "";
        
        if (myRole === 'left') {
            let localTime = 10.0;
            timerInterval = setInterval(() => {
                localTime -= 0.1;
                roomRef.update({ timeLeft: localTime });
                if (localTime <= 0) {
                    roomRef.update({ status: 'gameOver', winner: 'right', timeLeft: 0 });
                    clearInterval(timerInterval);
                }
            }, 100);
        }
    }

    function gameOverLocal(winner) {
        gameActive = false;
        clearInterval(timerInterval);
        bomb.style.display = 'none';
        alert("ドカーン！ P" + (winner === 'left' ? "1" : "2") + " の勝利！");
        location.reload(); // リロードしてタイトルへ
    }

    function updateTurnUI(turn) {
        bomb.style.left = (turn === "left" ? "25%" : "75%");
        pLeft.classList.toggle('active-turn', turn === "left");
        pRight.classList.toggle('active-turn', turn === "right");
        if (turn === myRole) {
            input.focus();
        } else {
            input.blur();
        }
    }

    // ★★変更：入力時の処理★★
    input.addEventListener('input', () => {
        roomRef.get().then(s => {
            const data = s.val();
            if (data.currentTurn !== myRole || !gameActive) {
                input.value = "";
                return;
            }

            const currentWordH = data.currentWord.h;
            const typedText = input.value;

            // 打った文字に応じてガイドの色を変える
            for (let i = 0; i < currentWordH.length; i++) {
                const guideSpan = document.getElementById('guide-' + i);
                if (!guideSpan) continue;

                if (i < typedText.length) {
                    // 打った文字が正解なら黒、間違ってたら灰色（今回は間違えても灰色）
                    // 将来的には赤にするなども可能
                    guideSpan.classList.add('typed');
                } else {
                    guideSpan.classList.remove('typed');
                }
            }

            // 全部打ち終わったら正解
            if (typedText === currentWordH) {
                const nextTurn = (myRole === 'left' ? 'right' : 'left');
                const nextWord = wordList[Math.floor(Math.random() * wordList.length)];
                
                roomRef.update({
                    currentTurn: nextTurn,
                    currentWord: nextWord,
                    timeLeft: Math.min(data.timeLeft + 2.0, 10.0) // 2秒回復
                });
                input.value = "";
                // ガイドはinitGame内の監視で次の単語に切り替わる
            }
        });
    });
</script>
</body>
</html>
