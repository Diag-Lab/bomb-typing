<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pict-Respective Mobile</title>
    <style>
        :root { --blue-bg: #87ceeb; --panel-white: #ffffff; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #333; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* ゲーム画面全体 */
        #game-screen { position: relative; width: 100vw; height: 100vh; max-width: 500px; max-height: 800px; background-color: var(--blue-bg); overflow: hidden; border: 4px solid #fff; box-sizing: border-box; }

        /* お題パネル */
        #word-panel { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); background: white; width: 85%; padding: 20px; border-radius: 10px; border-bottom: 8px solid #ffaa00; text-align: center; box-shadow: 0 6px 0 rgba(0,0,0,0.1); z-index: 10; }
        #target-word { font-size: 36px; font-weight: bold; margin: 0; color: #333; letter-spacing: 2px; }
        #target-romaji { font-size: 18px; color: #888; margin-top: 8px; font-family: monospace; }

        /* キャラクター */
        .character { position: absolute; bottom: 150px; width: 80px; height: 140px; transition: transform 0.3s; text-align: center; }
        .character img { width: 100%; filter: drop-shadow(3px 3px 0px #fff); }
        .player-label { background: rgba(255,255,255,0.8); border-radius: 5px; padding: 2px 5px; font-size: 12px; margin-top: 5px; font-weight: bold; }
        #player-left { left: 20px; }
        #player-right { right: 20px; }

        /* 爆弾 */
        #bomb { position: absolute; bottom: 180px; left: 50%; width: 60px; height: 60px; transform: translateX(-50%); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 50px; display: flex; justify-content: center; align-items: center; z-index: 5; }
        .bomb-ignite { animation: shake 0.1s infinite; }

        /* タイマーバー */
        #timer-container { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: rgba(0,0,0,0.2); }
        #timer-bar { width: 100%; height: 100%; background: #ff4444; transition: width 0.1s linear; }

        /* 入力エリア（透明） */
        #input-field { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; font-size: 16px; }
        #tap-guide { position: absolute; bottom: 50px; width: 100%; text-align: center; color: white; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 20px; animation: blink 1.5s infinite; }

        /* アニメーション */
        @keyframes shake { 0% { transform: translateX(-50%) rotate(0deg); } 50% { transform: translateX(-52%) rotate(5deg); } 100% { transform: translateX(-48%) rotate(-5deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .active-turn { transform: scale(1.3) translateY(-10px); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-screen">
    <div id="timer-container"><div id="timer-bar"></div></div>
    
    <div id="word-panel">
        <p id="target-word">READY?</p>
        <div id="target-romaji">Tap to Start</div>
    </div>

    <div id="player-left" class="character">
        <img src="https://api.iconify.design/mdi:human-male.svg?color=%238bc34a" alt="P1">
        <div class="player-label">PLAYER 1</div>
    </div>
    
    <div id="player-right" class="character">
        <img src="https://api.iconify.design/mdi:human-male.svg?color=%23f44336" alt="P2">
        <div class="player-label">PLAYER 2</div>
    </div>

    <div id="bomb" class="bomb-ignite">💣</div>
    <div id="tap-guide">画面をタップして開始！</div>

    <input type="text" id="input-field" autocomplete="off" autofocus>
</div>

<script>
    const wordList = [
        {h: "ふんどし", r: "hundosi"}, {h: "りんご", r: "ringo"}, {h: "すいか", r: "suika"},
        {h: "みかん", r: "mikan"}, {h: "ばなな", r: "banana"}, {h: "つくえ", r: "tukue"},
        {h: "いす", r: "isu"}, {h: "ねこ", r: "neko"}, {h: "いぬ", r: "inu"},
        {h: "とまと", r: "tomato"}, {h: "ぱん", r: "pan"}, {h: "くるま", r: "kuruma"}
    ];

    let gameActive = false;
    let currentPlayer = "left"; // left or right
    let timeLeft = 100;
    let timerInterval;

    const input = document.getElementById('input-field');
    const targetH = document.getElementById('target-word');
    const targetR = document.getElementById('target-romaji');
    const bomb = document.getElementById('bomb');
    const timerBar = document.getElementById('timer-bar');
    const pLeft = document.getElementById('player-left');
    const pRight = document.getElementById('player-right');
    const guide = document.getElementById('tap-guide');

    function setNextWord() {
        const item = wordList[Math.floor(Math.random() * wordList.length)];
        targetH.innerText = item.h;
        targetR.innerText = item.r;
        input.value = "";
    }

    function startGame() {
        gameActive = true;
        timeLeft = 100;
        currentPlayer = "left";
        guide.classList.add('hidden');
        updateTurnUI();
        setNextWord();
        input.focus();

        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft -= 0.5;
            timerBar.style.width = timeLeft + "%";
            if (timeLeft <= 0) {
                gameOver();
            }
        }, 100);
    }

    function gameOver() {
        gameActive = false;
        clearInterval(timerInterval);
        alert("ドカーン！ 負けました！");
        targetH.innerText = "GAME OVER";
        targetR.innerText = "Tap to Retry";
        guide.classList.remove('hidden');
    }

    function updateTurnUI() {
        if (currentPlayer === "left") {
            bomb.style.left = "25%";
            pLeft.classList.add('active-turn');
            pRight.classList.remove('active-turn');
        } else {
            bomb.style.left = "75%";
            pRight.classList.add('active-turn');
            pLeft.classList.remove('active-turn');
        }
    }

    input.addEventListener('input', () => {
        if (!gameActive) return;
        if (input.value === targetH.innerText) {
            // 正解！
            currentPlayer = (currentPlayer === "left") ? "right" : "left";
            timeLeft = Math.min(timeLeft + 15, 100); // ちょっと回復
            updateTurnUI();
            setNextWord();
        }
    });

    // 画面タップで入力を強制フォーカス
    document.addEventListener('click', () => {
        if (!gameActive) {
            startGame();
        } else {
            input.focus();
        }
    });
</script>
</body>
</html>
